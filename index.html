<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票輔助神器 - 模擬倉版</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary-color: #007bff; --success-color: #00c853; --danger-color: #ff3d00; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #333; }
        h1, h2, h3 { color: #fff; margin-top: 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 6px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-primary { background: var(--primary-color); }
        .btn-success { background: var(--success-color); }
        .btn-danger { background: var(--danger-color); padding: 6px 12px; font-size: 12px; }
        button:disabled { background: #444; cursor: not-allowed; }
        #result { white-space: pre-wrap; color: #a5d6a7; font-size: 15px; padding: 15px; background: #000; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #444; }
        .profit { color: var(--success-color); }
        .loss { color: var(--danger-color); }
        
        /* 手機版排版響應式設計 */
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>AI 15大訊號分析區</h2>
            <div class="input-group">
                <input type="text" id="symbol" placeholder="輸入代碼 (例: 2330.TW)" value="2330.TW">
                <button id="analyzeBtn" class="btn-primary" onclick="analyze()">開始健檢</button>
            </div>
            
            <div id="tradeZone" style="display: none; padding: 15px; background: #2a2a2a; border-radius: 8px; margin-bottom: 15px;">
                <span id="currentPriceDisplay" style="font-size: 18px; font-weight: bold; margin-right: 15px;"></span>
                <button class="btn-success" onclick="buyStock()">加入模擬倉 (買進)</button>
            </div>

            <div id="result">等待輸入代碼...</div>
        </div>

        <div class="card">
            <h2>我的模擬倉</h2>
            <p style="font-size: 12px; color: #888;">資料儲存於本地端，確保您的隱私。</p>
            <table id="portfolioTable">
                <thead>
                    <tr>
                        <th>標的</th>
                        <th>買入價</th>
                        <th>現價</th>
                        <th>損益</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="portfolioBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentAnalysis = { symbol: '', price: 0 };
        let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];

        // 初始化載入模擬倉
        renderPortfolio();

        async function analyze() {
            const symbol = document.getElementById('symbol').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('analyzeBtn');
            const tradeZone = document.getElementById('tradeZone');
            
            btn.disabled = true;
            btn.innerText = "訊號掃描中...";
            tradeZone.style.display = "none";
            resultDiv.innerHTML = 'AI 正在進行 15 大訊號結構化分析，請稍候...';
            
            try {
                // 請確認此處為您的 Render 網址
                const response = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    resultDiv.innerText = data.analysis;
                    // 紀錄當前股票資訊供模擬倉使用
                    currentAnalysis.symbol = data.symbol;
                    currentAnalysis.price = data.current_price;
                    
                    document.getElementById('currentPriceDisplay').innerText = `最新收盤價: ${data.current_price} 元`;
                    tradeZone.style.display = "block";
                    
                    // 分析完順便更新一次模擬倉的即時價格
                    updatePortfolioPrices(); 
                } else {
                    resultDiv.innerText = "分析出錯了：" + data.message;
                }
            } catch (error) {
                resultDiv.innerText = '連線失敗！請確認伺服器狀態。';
            } finally {
                btn.disabled = false;
                btn.innerText = "開始健檢";
            }
        }

        function buyStock() {
            if(!currentAnalysis.symbol || currentAnalysis.price === 0) return;
            
            portfolio.push({
                symbol: currentAnalysis.symbol,
                buyPrice: currentAnalysis.price,
                currentPrice: currentAnalysis.price
            });
            
            saveAndRender();
            alert(`已模擬買入 ${currentAnalysis.symbol}，成交價 ${currentAnalysis.price} 元`);
        }

        function sellStock(index) {
            portfolio.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myPortfolio', JSON.stringify(portfolio));
            renderPortfolio();
        }

        function renderPortfolio() {
            const tbody = document.getElementById('portfolioBody');
            tbody.innerHTML = '';
            
            if(portfolio.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#888;">目前無持股</td></tr>';
                return;
            }

            portfolio.forEach((item, index) => {
                const pl = ((item.currentPrice - item.buyPrice) / item.buyPrice) * 100;
                const plClass = pl >= 0 ? 'profit' : 'loss';
                const plText = pl >= 0 ? `+${pl.toFixed(2)}%` : `${pl.toFixed(2)}%`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.symbol.replace('.TW', '')}</strong></td>
                    <td>${item.buyPrice.toFixed(1)}</td>
                    <td>${item.currentPrice.toFixed(1)}</td>
                    <td class="${plClass}">${plText}</td>
                    <td><button class="btn-danger" onclick="sellStock(${index})">平倉</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updatePortfolioPrices() {
            // 這是一個簡化的自動更新價格功能，會依序向後端請求最新價格
            for (let i = 0; i < portfolio.length; i++) {
                try {
                    const res = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${portfolio[i].symbol}`);
                    const data = await res.json();
                    if(data.status === "success") {
                        portfolio[i].currentPrice = data.current_price;
                    }
                } catch(e) { console.log("更新價格失敗", e); }
            }
            saveAndRender();
        }
    </script>
</body>
</html>
