<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票戰情室 - 防禦盾牌版</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-dark: #050810; --panel-bg: #111520; --border-color: #232b3e; --text-main: #d1d4dc; --text-muted: #787b86; --blue: #2962ff; --red: #ef5350; --green: #26a69a; --orange: #ff9800; --ma5: #fdd835; --ma20: #ff4081; --ma60: #00bcd4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .search-group { display: flex; gap: 10px; width: 50%; }
        input[type="text"], select { padding: 10px; background: #0b0e14; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; font-weight: bold; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; background: var(--blue); }
        button:hover { background: #1e4bd8; }
        button:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }
        
        .price-zone { display: none; align-items: baseline; gap: 15px; }
        .current-price { font-size: 32px; font-weight: bold; color: var(--red); }
        
        .main-grid { display: grid; grid-template-columns: 4fr 3fr 3fr; gap: 15px; display: none; }
        .column { display: flex; flex-direction: column; gap: 15px; }
        
        .chart-wrapper { background: var(--panel-bg); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); }
        .chart-box { position: relative; width: 100%; }
        .chart-title { position: absolute; z-index: 2; padding: 3px 6px; font-size: 11px; background: rgba(0,0,0,0.6); color: #fff; top: 5px; left: 5px; display: flex; gap: 10px; align-items: center; border-radius: 4px; }
        .legend-ma5 { color: var(--ma5); } .legend-ma20 { color: var(--ma20); } .legend-ma60 { color: var(--ma60); }
        .chart-legend { position: absolute; z-index: 10; font-size: 12px; color: #fff; background: rgba(0,0,0,0.8); border-radius: 4px; top: 30px; left: 5px; padding: 5px; display: none; border: 1px solid var(--border-color); }
        
        #mainChart { height: 400px; } .sub-chart { height: 120px; }
        
        .info-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .card-header { font-size: 13px; font-weight: bold; color: var(--blue); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
        
        .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .f-item { background: #0b0e14; padding: 10px; border-radius: 4px; text-align: center; }
        .f-label { font-size: 11px; color: var(--text-muted); }
        .f-val { font-size: 18px; font-weight: bold; color: white; margin-top: 5px; }
        .stars { color: var(--orange); font-size: 22px; letter-spacing: 2px; }
        
        .chip-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; margin-top: 5px; }
        .chip-table th { background: #0b0e14; padding: 6px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); font-weight: normal; }
        .chip-table td { padding: 6px; border-bottom: 1px solid #1a1e29; }
        .txt-red { color: var(--red); } .txt-green { color: var(--green); }

        .path-box { background: #0b0e14; border-left: 4px solid var(--orange); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .path-title { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .path-desc { font-size: 14px; color: white; }

        .quant-panel { display: flex; justify-content: space-around; background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--red); margin-bottom: 15px; }
        .quant-item { text-align: center; }
        .quant-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .quant-item .val { font-size: 22px; font-weight: bold; font-family: monospace; color: white; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--blue); cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border-color); border-radius: 2px; }
        
        #slider-risk::-webkit-slider-thumb { background: var(--red); box-shadow: 0 0 5px rgba(239, 83, 80, 0.5); }

        #sysMessage { margin-bottom: 15px; font-size: 14px; }
        .advice-list li { margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="search-group">
            <input type="text" id="symbol" value="2441" placeholder="輸入台股代碼">
            <select id="intervalSelector">
                <option value="1d" selected>日K線</option>
                <option value="60m">60分K</option>
                <option value="15m">15分K</option>
                <option value="5m">5分K</option>
                <option value="1m">1分K (超短線)</option>
            </select>
            <button id="analyzeBtn" onclick="analyze()">啟動全盤掃描</button>
        </div>
        <div class="price-zone" id="priceZone">
            <div id="stockTitle" style="font-weight:bold; font-size:24px;">--</div>
            <div class="current-price" id="currentPriceDisplay">0.00</div>
        </div>
    </div>
    
    <div id="sysMessage"></div>
    
    <div class="main-grid" id="mainGrid">
        <div class="column">
            <div class="chart-wrapper">
                <div class="chart-box">
                    <div class="chart-title">
                        <span id="mainChartTitle">K線</span>
                        <span class="legend-ma5" id="l-ma5">MA5: --</span>
                        <span class="legend-ma20" id="l-ma20">MA20: --</span>
                        <span class="legend-ma60" id="l-ma60">MA60: --</span>
                    </div>
                    <div class="chart-legend" id="chartLegend"></div>
                    <div id="mainChart"></div>
                </div>
                <div class="chart-box"><div class="chart-title">MACD (12,26,9)</div><div id="macdChart" class="sub-chart"></div></div>
                <div class="chart-box"><div class="chart-title">KD (9,3,3)</div><div id="kdChart" class="sub-chart"></div></div>
                <div class="chart-box"><div class="chart-title">OBV (能量潮)</div><div id="obvChart" class="sub-chart"></div></div>
                <div class="chart-box" id="chipBox"><div class="chart-title">三大法人買賣超</div><div id="chipChart" class="sub-chart"></div></div>
            </div>
        </div>
        
        <div class="column">
            <div class="info-card" id="chipTableCard">
                <div class="card-header">三大法人近 10 日買賣超 (張)</div>
                <table class="chip-table">
                    <thead><tr><th>日期</th><th>外資</th><th>投信</th><th>自營</th><th>合計</th></tr></thead>
                    <tbody id="chipTableBody"></tbody>
                </table>
            </div>

            <div class="info-card">
                <div class="card-header">可能路徑推演</div>
                <div class="path-box" style="border-left-color: var(--red);">
                    <div class="path-title">🔼 突破路徑</div>
                    <div class="path-desc" id="ai-path-up">--</div>
                </div>
                <div class="path-box" style="border-left-color: var(--green);">
                    <div class="path-title">🔽 防守路徑</div>
                    <div class="path-desc" id="ai-path-down">--</div>
                </div>
            </div>

            <div class="info-card" style="border-color: var(--blue);">
                <div class="card-header" style="color: var(--blue);">📊 動態估值計算器</div>
                <div style="margin-bottom: 15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span style="font-size:12px; color:var(--text-muted)">1. 預估未來 EPS (元)</span><span id="calc-eps-val" style="font-weight:bold; color:#fff">0.00</span>
                    </div>
                    <input type="range" id="slider-eps" min="0" max="150" step="0.5" value="0" oninput="updateCalc()">
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span style="font-size:12px; color:var(--text-muted)">2. 目標本益比</span><span id="calc-pe-val" style="font-weight:bold; color:#fff">15.0</span>
                    </div>
                    <input type="range" id="slider-pe" min="5" max="80" step="1" value="15" oninput="updateCalc()">
                </div>
                <div style="background:#0b0e14; padding:15px; border-radius:6px; text-align:center; border: 1px solid var(--border-color);">
                    <div style="font-size:12px; color:var(--text-muted); margin-bottom:5px;">合理股價推算</div>
                    <div id="calc-result" style="font-size:28px; font-weight:bold; color:var(--blue); font-family:monospace;">--</div>
                    <div id="calc-status" style="font-size:14px; margin-top:8px; font-weight:bold;">--</div>
                </div>
            </div>
        </div>

        <div
