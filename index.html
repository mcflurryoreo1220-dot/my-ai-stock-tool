<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票輔助神器 - 專業版</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-color: #007bff;
            --success-color: #00ff00;
            --error-color: #ff4d4d;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: #e0e0e0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
        h3 { margin-top: 0; color: #aaa; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }
        #result { white-space: pre-wrap; color: var(--success-color); font-size: 15px; }
        .error-msg { color: var(--error-color); }
        .loading-text { color: var(--primary-color); font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 股票輔助神器</h1>
        
        <div class="card">
            <h3>股票代碼查詢</h3>
            <p style="font-size: 13px; color: #888;">請輸入台股代碼，例如：2330.TW (台積電) 或 2317.TW (鴻海)</p>
            <div class="input-group">
                <input type="text" id="symbol" placeholder="例如: 2330.TW" value="2330.TW">
                <button id="analyzeBtn" onclick="analyze()">開始分析</button>
            </div>
        </div>

        <div class="card">
            <h3>AI 分析結果</h3>
            <div id="result">尚未開始分析。請點擊上方按鈕。</div>
        </div>
    </div>

    <script>
        async function analyze() {
            const symbol = document.getElementById('symbol').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('analyzeBtn');
            
            // --- 防呆邏輯開始 ---
            btn.disabled = true; // 鎖定按鈕
            btn.innerText = "分析中...";
            resultDiv.innerHTML = '<span class="loading-text">AI 正在讀取近期股價、運算 KD 與 MACD 趨勢中，請稍候約 10 秒...</span>';
            
            try {
                // 串接您的 Render 後端網址
                const response = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    // 顯示 AI 產出的內容
                    resultDiv.innerText = data.analysis;
                } else {
                    // 處理後端傳回的錯誤 (如 API 流量超限)
                    resultDiv.innerHTML = `<span class="error-msg">分析出錯了：${data.message || data.details}</span>`;
                }
            } catch (error) {
                // 處理連線錯誤
                resultDiv.innerHTML = '<span class="error-msg">連線失敗！請確認後端伺服器 (Render) 是否已啟動。</span>';
            } finally {
                // --- 不論成功或失敗，最後都解鎖按鈕 ---
                btn.disabled = false;
                btn.innerText = "開始分析";
            }
        }
    </script>
</body>
</html>
