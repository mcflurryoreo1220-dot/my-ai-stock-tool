<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票輔助神器 - 戰情室版</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #151924; --primary-color: #2962ff; --success-color: #26a69a; --danger-color: #ef5350; --text-main: #d1d4dc; --text-muted: #787b86; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.6; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 3fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #2b2b43; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        h1, h2, h3 { color: #fff; margin-top: 0; font-weight: 500; }
        
        /* 搜尋列 */
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #0b0e14; padding: 15px; border-radius: 8px; border: 1px solid #2b2b43; }
        input { flex: 1; padding: 12px 20px; background: #151924; border: 1px solid #2b2b43; color: white; border-radius: 6px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary-color); }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; font-size: 15px; }
        .btn-primary { background: var(--primary-color); }
        .btn-primary:hover { background: #1e4bd8; }
        .btn-success { background: var(--success-color); }
        .btn-danger { background: var(--danger-color); padding: 6px 12px; font-size: 12px; }
        button:disabled { background: #2b2b43; color: var(--text-muted); cursor: not-allowed; }

        /* 圖表區 */
        #chartContainer { width: 100%; height: 400px; display: none; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #2b2b43; }
        
        /* AI 戰情面板 Grid */
        .ai-dashboard { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .info-box { background: #0b0e14; padding: 15px; border-radius: 8px; border: 1px solid #2b2b43; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .info-box.wide { grid-column: span 4; align-items: flex-start; text-align: left; }
        .box-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .box-value { font-size: 22px; font-weight: bold; color: #fff; }
        .value-red { color: var(--danger-color); }
        .value-green { color: var(--success-color); }
        .value-blue { color: #29b6f6; }
        .summary-text { font-size: 15px; color: #a5d6a7; line-height: 1.8; }

        /* 頂部報價區 */
        #tradeZone { display: none; justify-content: space-between; align-items: center; background: #0b0e14; padding: 15px 20px; border-radius: 8px; border: 1px solid #2b2b43; margin-bottom: 20px; }
        .price-display { font-size: 24px; font-weight: bold; color: var(--danger-color); }

        /* 模擬倉表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #2b2b43; }
        th { color: var(--text-muted); font-weight: 500; }
        .profit { color: var(--danger-color); } /* 台股紅漲 */
        .loss { color: var(--success-color); }  /* 台股綠跌 */
        
        /* 系統訊息 */
        #sysMessage { margin-bottom: 15px; font-size: 14px; }

        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } .ai-dashboard { grid-template-columns: repeat(2, 1fr); } .info-box.wide { grid-column: span 2; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="search-bar">
                <input type="text" id="symbol" placeholder="輸入台股代碼 (例: 2330)" value="2330">
                <button id="analyzeBtn" class="btn-primary" onclick="analyze()">啟動 AI 分析</button>
            </div>
            
            <div id="sysMessage"></div>

            <div id="tradeZone">
                <div style="display:flex; align-items:center; gap:15px;">
                    <span style="font-size:18px; font-weight:bold; color:#fff;" id="stockTitle"></span>
                    <span class="price-display" id="currentPriceDisplay"></span>
                </div>
                <button class="btn-primary" style="background:#ff9800;" onclick="buyStock()">加入模擬倉</button>
            </div>

            <div id="chartContainer"></div>

            <div id="aiDashboard" class="ai-dashboard">
                <div class="info-box">
                    <div class="box-title">目前趨勢</div>
                    <div class="box-value value-blue" id="ai-trend">--</div>
                </div>
                <div class="info-box">
                    <div class="box-title">短線壓力</div>
                    <div class="box-value value-red" id="ai-pressure">--</div>
                </div>
                <div class="info-box">
                    <div class="box-title">短線支撐</div>
                    <div class="box-value value-green" id="ai-support">--</div>
                </div>
                <div class="info-box">
                    <div class="box-title">操作建議</div>
                    <div class="box-value" style="color:#ffb74d;" id="ai-action">--</div>
                </div>
                <div class="info-box wide">
                    <div class="box-title">AI 技術面總結</div>
                    <div class="summary-text" id="ai-summary">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>我的模擬倉</h2>
            <p style="font-size: 13px; color: var(--text-muted);">資料儲存於瀏覽器本地端</p>
            <table id="portfolioTable">
                <thead>
                    <tr>
                        <th>標的</th>
                        <th>買入</th>
                        <th>現價</th>
                        <th>損益</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="portfolioBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentAnalysis = { symbol: '', price: 0 };
        let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];
        let chart = null;

        renderPortfolio();

        async function analyze() {
            let rawSymbol = document.getElementById('symbol').value.trim().toUpperCase();
            if (!rawSymbol) return;
            const symbol = /^\d+$/.test(rawSymbol) ? rawSymbol + ".TW" : rawSymbol;
            document.getElementById('symbol').value = symbol;

            const btn = document.getElementById('analyzeBtn');
            const sysMsg = document.getElementById('sysMessage');
            
            // 隱藏舊資料
            document.getElementById('tradeZone').style.display = "none";
            document.getElementById('chartContainer').style.display = "none"; 
            document.getElementById('aiDashboard').style.display = "none";
            
            btn.disabled = true;
            btn.innerText = "資料運算中...";
            sysMsg.innerHTML = '<span style="color:var(--primary-color);">🔄 AI 正在獲取數據並生成結構化面板，請稍候...</span>';
            
            try {
                const response = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}`);
                
                if (!response.ok) throw new Error(`伺服器異常 (${response.status})`);
                const data = await response.json();
                
                if (data.status === "success") {
                    sysMsg.innerHTML = '';
                    currentAnalysis.symbol = data.symbol;
                    currentAnalysis.price = data.current_price;
                    
                    document.getElementById('stockTitle').innerText = data.symbol.replace('.TW', '');
                    document.getElementById('currentPriceDisplay').innerText = data.current_price;
                    document.getElementById('tradeZone').style.display = "flex";
                    
                    // 填入 AI 結構化資料
                    const ai = data.ai_analysis;
                    document.getElementById('ai-trend').innerText = ai.trend || '--';
                    document.getElementById('ai-pressure').innerText = ai.pressure || '--';
                    document.getElementById('ai-support').innerText = ai.support || '--';
                    document.getElementById('ai-action').innerText = ai.action || '--';
                    document.getElementById('ai-summary').innerText = ai.summary || '--';
                    document.getElementById('aiDashboard').style.display = "grid";
                    
                    if (data.chart_data && data.chart_data.length > 0) renderChart(data.chart_data);
                    
                    updatePortfolioPrices(); 
                } else {
                    sysMsg.innerHTML = `<span style="color:var(--danger-color);">❌ 分析出錯：${data.message}</span>`;
                }
            } catch (error) {
                sysMsg.innerHTML = `<span style="color:var(--danger-color);">❌ 連線失敗：${error.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "啟動 AI 分析";
            }
        }

        function renderChart(chartData) {
            const container = document.getElementById('chartContainer');
            container.style.display = 'block';
            if (chart) { chart.remove(); chart = null; }

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 400,
                layout: { background: { color: '#0b0e14' }, textColor: '#787b86' },
                grid: { vertLines: { color: '#151924' }, horzLines: { color: '#151924' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            });

            const candlestickSeries = chart.addCandlestickSeries({
                upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a',
            });
            candlestickSeries.setData(chartData);
            chart.timeScale().fitContent(); 
        }

        function buyStock() {
            if(!currentAnalysis.symbol || currentAnalysis.price === 0) return;
            portfolio.push({ symbol: currentAnalysis.symbol, buyPrice: currentAnalysis.price, currentPrice: currentAnalysis.price });
            saveAndRender();
        }

        function sellStock(index) {
            portfolio.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myPortfolio', JSON.stringify(portfolio));
            renderPortfolio();
        }

        function renderPortfolio() {
            const tbody = document.getElementById('portfolioBody');
            tbody.innerHTML = '';
            if(portfolio.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">目前無持股</td></tr>';
                return;
            }
            portfolio.forEach((item, index) => {
                const pl = ((item.currentPrice - item.buyPrice) / item.buyPrice) * 100;
                // 台股習慣：紅漲綠跌
                const plClass = pl >= 0 ? 'profit' : 'loss';
                const plText = pl >= 0 ? `+${pl.toFixed(2)}%` : `${pl.toFixed(2)}%`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:#fff; font-weight:bold;">${item.symbol.replace('.TW', '')}</td>
                    <td>${item.buyPrice.toFixed(1)}</td>
                    <td>${item.currentPrice.toFixed(1)}</td>
                    <td class="${plClass}" style="font-weight:bold;">${plText}</td>
                    <td><button class="btn-danger" onclick="sellStock(${index})">平</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updatePortfolioPrices() {
            for (let i = 0; i < portfolio.length; i++) {
                try {
                    const res = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${portfolio[i].symbol}`);
                    if(res.ok) {
                        const data = await res.json();
                        if(data.status === "success") portfolio[i].currentPrice = data.current_price;
                    }
                } catch(e) {}
            }
            saveAndRender();
        }
    </script>
</body>
</html>
