<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票輔助神器 - 終極藍圖版</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-dark: #050810; --panel-bg: #111520; --border-color: #232b3e; --text-main: #d1d4dc; --text-muted: #787b86; --blue: #2962ff; --red: #ef5350; --green: #26a69a; --orange: #ff9800; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .search-group { display: flex; gap: 10px; width: 60%; align-items: center; }
        input { flex: 1; padding: 10px 15px; background: #0b0e14; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; }
        
        /* 週期選單樣式 */
        select { padding: 10px; background: #0b0e14; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; font-weight: bold; cursor: pointer; }
        
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; background: var(--blue); transition: 0.2s; white-space: nowrap; }
        button:hover { background: #1e4bd8; }
        button:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }
        
        .price-zone { display: none; align-items: baseline; gap: 15px; }
        .symbol-name { font-size: 24px; font-weight: bold; color: white; letter-spacing: 1px; }
        .current-price { font-size: 32px; font-weight: bold; color: var(--red); }
        .add-btn { background: var(--orange); padding: 8px 15px; font-size: 13px; }

        .main-grid { display: grid; grid-template-columns: 7fr 3fr; gap: 15px; display: none; }
        .left-col { display: flex; flex-direction: column; gap: 15px; }
        
        .quant-panel { display: flex; justify-content: space-around; background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--blue); }
        .quant-item { text-align: center; }
        .quant-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .quant-item .val { font-size: 22px; font-weight: bold; font-family: monospace; color: white; }

        .chart-wrapper { display: flex; flex-direction: column; gap: 2px; background: var(--panel-bg); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); }
        .chart-box { position: relative; width: 100%; }
        .chart-title { position: absolute; z-index: 2; padding: 3px 6px; font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.6); border-radius: 3px; top: 5px; left: 5px; pointer-events: none; }
        
        /* 浮動圖例 (顯示日期與 OHLC) */
        .chart-legend { position: absolute; z-index: 10; padding: 5px 8px; font-size: 13px; font-family: monospace; font-weight: bold; color: #fff; background: rgba(0,0,0,0.7); border-radius: 4px; top: 30px; left: 5px; pointer-events: none; display: none; }

        #mainChart { height: 350px; } 
        #macdChart, #kdChart, #obvChart, #chipChart { height: 120px; }
        
        .right-col { display: flex; flex-direction: column; gap: 15px; }
        .info-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .card-header { font-size: 14px; font-weight: bold; color: var(--blue); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .p-box { background: #0b0e14; padding: 10px; border-radius: 6px; }
        .p-label { font-size: 12px; color: var(--text-muted); }
        .p-val { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .p-pressure { color: var(--green); } .p-support { color: var(--red); }
        .path-box { background: #0b0e14; border-left: 4px solid var(--orange); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .path-title { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .path-desc { font-size: 14px; color: white; }
        .advice-list { padding-left: 20px; margin: 0; color: #a5d6a7; font-size: 14px; line-height: 1.8; }
        .stars { color: var(--orange); font-size: 20px; letter-spacing: 2px; }

        #sysMessage { margin-bottom: 15px; font-size: 14px; }
        .portfolio-card { background: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border-color); padding: 15px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .profit { color: var(--red); } .loss { color: var(--green); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="search-group">
            <input type="text" id="symbol" placeholder="輸入台股代碼 (例: 3661)" value="3661">
            <select id="intervalSelector">
                <option value="1d" selected>日K線</option>
                <option value="60m">60分K</option>
                <option value="15m">15分K</option>
                <option value="5m">5分K</option>
            </select>
            <button id="analyzeBtn" onclick="analyze()">啟動全盤掃描</button>
        </div>
        <div class="price-zone" id="priceZone">
            <div class="symbol-name" id="stockTitle">--</div>
            <div class="current-price" id="currentPriceDisplay">0.00</div>
            <button class="add-btn" onclick="buyStock()">加入模擬倉</button>
        </div>
    </div>
    
    <div id="sysMessage"></div>

    <div class="main-grid" id="mainGrid">
        <div class="left-col">
            <div class="quant-panel">
                <div class="quant-item"><div class="label">KD 歷史交易次數</div><div class="val" id="bt-trades">0 次</div></div>
                <div class="quant-item"><div class="label">策略勝率</div><div class="val" id="bt-winrate">0%</div></div>
                <div class="quant-item"><div class="label">累計報酬率</div><div class="val" id="bt-return">0%</div></div>
            </div>
            
            <div class="chart-wrapper">
                <div class="chart-box">
                    <div class="chart-title" id="mainChartTitle">日K線 (訊號標記)</div>
                    <div class="chart-legend" id="chartLegend"></div> <div id="mainChart"></div>
                </div>
                <div class="chart-box"><div class="chart-title">MACD (12,26,9)</div><div id="macdChart"></div></div>
                <div class="chart-box"><div class="chart-title">KD (9,3,3)</div><div id="kdChart"></div></div>
                <div class="chart-box"><div class="chart-title">OBV (能量潮指標)</div><div id="obvChart"></div></div>
                <div class="chart-box" id="chipBox"><div class="chart-title">三大法人買賣超</div><div id="chipChart"></div></div>
            </div>
        </div>

        <div class="right-col">
            <div class="info-card" style="text-align: center; border-color: var(--orange);">
                <div class="card-header" style="justify-content: center; color: var(--orange);">綜合 AI 評估</div>
                <div style="font-size: 22px; font-weight: bold; color: white; margin-bottom: 5px;" id="ai-signal">--</div>
                <div class="stars" id="ai-stars">☆☆☆☆☆</div>
            </div>

            <div class="info-card">
                <div class="card-header">短線關鍵價位</div>
                <div class="price-grid">
                    <div class="p-box"><div class="p-label">上檔壓力</div><div class="p-val p-pressure" id="ai-pressure">--</div></div>
                    <div class="p-box"><div class="p-label">下檔支撐</div><div class="p-val p-support" id="ai-support">--</div></div>
                    <div class="p-box" style="grid-column: span 2;"><div class="p-label">嚴格停損位</div><div class="p-val" style="color: white;" id="ai-stop">--</div></div>
                </div>
            </div>

            <div class="info-card">
                <div class="card-header">可能路徑推演</div>
                <div class="path-box" style="border-left-color: var(--red);">
                    <div class="path-title">🔼 上漲路徑</div>
                    <div class="path-desc" id="ai-path-up">--</div>
                </div>
                <div class="path-box" style="border-left-color: var(--green);">
                    <div class="path-title">🔽 回檔路徑</div>
                    <div class="path-desc" id="ai-path-down">--</div>
                </div>
            </div>

            <div class="info-card">
                <div class="card-header">我的建議</div>
                <ul class="advice-list" id="ai-advice">
                    <li>等待數據載入中...</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="portfolio-card">
        <div class="card-header" style="border:none; margin:0;">我的模擬倉</div>
        <table id="portfolioTable">
            <thead><tr><th>標的</th><th>買入</th><th>現價</th><th>損益</th><th>操作</th></tr></thead>
            <tbody id="portfolioBody"></tbody>
        </table>
    </div>

    <script>
        let currentAnalysis = { symbol: '', price: 0 };
        let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];
        let charts = {}; 
        let currentCandleSeries = null;
        renderPortfolio();

        async function analyze() {
            let rawSymbol = document.getElementById('symbol').value.trim().toUpperCase();
            if (!rawSymbol) return;
            const symbol = /^\d+$/.test(rawSymbol) ? rawSymbol + ".TW" : rawSymbol;
            document.getElementById('symbol').value = symbol;
            
            // 抓取下拉選單的週期
            const interval = document.getElementById('intervalSelector').value;

            const btn = document.getElementById('analyzeBtn');
            const sysMsg = document.getElementById('sysMessage');
            
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('priceZone').style.display = "none";
            
            btn.disabled = true; btn.innerText = "掃描中...";
            sysMsg.innerHTML = '<span style="color:var(--blue);">🔄 正在切換週期並由 PRO 引擎解析...</span>';
            
            try {
                // 將 interval 參數送到後端
                const response = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}&interval=${interval}`);
                if (!response.ok) {
                    let errDetail = "連線錯誤";
                    try { const errJson = await response.json(); errDetail = errJson.message || errDetail; } 
                    catch(e) { errDetail = await response.text(); }
                    throw new Error(`(${response.status}) ${errDetail}`);
                }

                const data = await response.json();
                
                if (data.status === "success") {
                    sysMsg.innerHTML = '';
                    currentAnalysis.symbol = data.symbol; currentAnalysis.price = data.current_price;
                    
                    document.getElementById('stockTitle').innerText = data.symbol.replace('.TW', '');
                    document.getElementById('currentPriceDisplay').innerText = parseFloat(data.current_price).toFixed(2);
                    document.getElementById('priceZone').style.display = "flex";
                    
                    // 動態更改圖表標題
                    const intervalText = document.getElementById('intervalSelector').options[document.getElementById('intervalSelector').selectedIndex].text;
                    document.getElementById('mainChartTitle').innerText = `${intervalText} (訊號標記)`;
                    
                    // 分K時隱藏籌碼圖
                    if (data.interval === '1d') {
                        document.getElementById('chipBox').style.display = "block";
                    } else {
                        document.getElementById('chipBox').style.display = "none";
                    }
                    
                    const ai = data.ai_analysis;
                    document.getElementById('ai-signal').innerText = ai.signal || '解析中';
                    document.getElementById('ai-pressure').innerText = ai.pressure || '--';
                    document.getElementById('ai-support').innerText = ai.support || '--';
                    document.getElementById('ai-stop').innerText = ai.stop_loss || '--';
                    document.getElementById('ai-path-up').innerText = ai.path_up || '--';
                    document.getElementById('ai-path-down').innerText = ai.path_down || '--';
                    
                    let starCount = parseInt(ai.stars) || 3;
                    document.getElementById('ai-stars').innerText = '★'.repeat(starCount) + '☆'.repeat(5 - starCount);
                    
                    const adviceUl = document.getElementById('ai-advice');
                    adviceUl.innerHTML = '';
                    if (Array.isArray(ai.advice)) {
                        ai.advice.forEach(text => {
                            let li = document.createElement('li');
                            li.innerText = text;
                            adviceUl.appendChild(li);
                        });
                    } else { adviceUl.innerHTML = '<li>' + (ai.advice || '--') + '</li>'; }

                    document.getElementById('mainGrid').style.display = "grid";
                    
                    if (data.chart_data) {
                        runBacktest(data.chart_data, data.kd_data);
                        renderCharts(data.chart_data, data.macd_data, data.kd_data, data.obv_data, data.chip_data, data.interval);
                    }
                    updatePortfolioPrices(); 
                } else { sysMsg.innerHTML = `<span style="color:var(--red);">❌ 分析出錯：${data.message}</span>`; }
            } catch (error) { sysMsg.innerHTML = `<span style="color:var(--red);">❌ 連線失敗：${error.message}</span>`; } 
            finally { btn.disabled = false; btn.innerText = "啟動全盤掃描"; }
        }

        function runBacktest(klineData, kdData) {
            let holding = false; let buyPrice = 0; let totalReturn = 0; let wins = 0; let losses = 0;
            let priceMap = {}; klineData.forEach(d => { priceMap[d.time] = d.close; });
            for (let i = 1; i < kdData.length; i++) {
                const prev = kdData[i - 1], curr = kdData[i];
                const currentPrice = priceMap[curr.time];
                if(!currentPrice) continue;
                if (!holding && prev.k <= prev.d && curr.k > curr.d) { holding = true; buyPrice = currentPrice; }
                else if (holding && prev.k >= prev.d && curr.k < curr.d) {
                    holding = false;
                    let profitPercent = ((currentPrice - buyPrice) / buyPrice) * 100;
                    totalReturn += profitPercent;
                    if (profitPercent > 0) wins++; else losses++;
                }
            }
            if (holding) {
                let profitPercent = ((klineData[klineData.length-1].close - buyPrice) / buyPrice) * 100;
                totalReturn += profitPercent;
                if (profitPercent > 0) wins++; else losses++;
            }
            let totalTrades = wins + losses;
            let winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
            
            document.getElementById('bt-trades').innerText = `${totalTrades} 次`;
            let winRateEl = document.getElementById('bt-winrate');
            winRateEl.innerText = `${winRate}%`; winRateEl.style.color = winRate > 50 ? 'var(--red)' : (winRate == 0 ? '#fff' : 'var(--green)');
            let returnEl = document.getElementById('bt-return');
            returnEl.innerText = `${totalReturn > 0 ? '+' : ''}${totalReturn.toFixed(2)}%`; returnEl.style.color = totalReturn >= 0 ? 'var(--red)' : 'var(--green)';
        }

        function renderCharts(klineData, macdData, kdData, obvData, chipData, interval) {
            if (charts.main) { 
                charts.main.remove(); charts.macd.remove(); charts.kd.remove(); charts.obv.remove();
                if(charts.chip) charts.chip.remove(); 
            }
            
            const timeFormatStr = interval === '1d' ? 'yyyy-MM-dd' : 'yyyy-MM-dd HH:mm';
            const chartOptions = { 
                layout: { background: { color: '#111520' }, textColor: '#787b86' }, 
                grid: { vertLines: { color: '#232b3e' }, horzLines: { color: '#232b3e' } }, 
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }, 
                timeScale: { visible: false, timeVisible: interval !== '1d' } 
            };

            charts.main = LightweightCharts.createChart(document.getElementById('mainChart'), { ...chartOptions, height: 350 });
            currentCandleSeries = charts.main.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a' });
            currentCandleSeries.setData(klineData);

            // 【浮動圖例功能】：滑鼠移動時更新數值
            const legend = document.getElementById('chartLegend');
            charts.main.subscribeCrosshairMove(param => {
                if (param.time) {
                    const price = param.seriesData.get(currentCandleSeries);
                    if (price) {
                        let timeStr = param.time;
                        // 分K的 time 是 timestamp，日線的 time 是 'YYYY-MM-DD'
                        if (typeof param.time === 'number') {
                            const d = new Date(param.time * 1000);
                            timeStr = d.toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                        }
                        legend.style.display = 'block';
                        legend.innerHTML = `時間: ${timeStr} &nbsp; 開:<span style="color:#fff">${price.open}</span> &nbsp; 高:<span style="color:var(--red)">${price.high}</span> &nbsp; 低:<span style="color:var(--green)">${price.low}</span> &nbsp; 收:<span style="color:#ff9800">${price.close}</span>`;
                    }
                } else {
                    legend.style.display = 'none';
                }
            });

            if (kdData && kdData.length > 1) {
                let markers = [];
                for (let i = 1; i < kdData.length; i++) {
                    const p = kdData[i - 1], c = kdData[i];
                    if (p.k <= p.d && c.k > c.d) markers.push({ time: c.time, position: 'belowBar', color: '#ef5350', shape: 'arrowUp', text: '買' });
                    else if (p.k >= p.d && c.k < c.d) markers.push({ time: c.time, position: 'aboveBar', color: '#26a69a', shape: 'arrowDown', text: '賣' });
                }
                currentCandleSeries.setMarkers(markers);
            }

            charts.macd = LightweightCharts.createChart(document.getElementById('macdChart'), { ...chartOptions, height: 120 });
            const macdOscSeries = charts.macd.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' } });
            const macdDifSeries = charts.macd.addLineSeries({ color: '#2962ff', lineWidth: 1.5 });
            const macdSigSeries = charts.macd.addLineSeries({ color: '#ff9800', lineWidth: 1.5 });
            macdOscSeries.setData(macdData.map(d => ({ time: d.time, value: d.osc, color: d.osc > 0 ? '#ef5350' : '#26a69a' })));
            macdDifSeries.setData(macdData.map(d => ({ time: d.time, value: d.dif })));
            macdSigSeries.setData(macdData.map(d => ({ time: d.time, value: d.signal })));

            charts.kd = LightweightCharts.createChart(document.getElementById('kdChart'), { ...chartOptions, height: 120 });
            const kLine = charts.kd.addLineSeries({ color: '#2962ff', lineWidth: 1.5 }); 
            const dLine = charts.kd.addLineSeries({ color: '#ff9800', lineWidth: 1.5 }); 
            kLine.setData(kdData.map(d => ({ time: d.time, value: d.k })));
            dLine.setData(kdData.map(d => ({ time: d.time, value: d.d })));

            // 繪製 OBV 能量圖
            charts.obv = LightweightCharts.createChart(document.getElementById('obvChart'), { ...chartOptions, height: 120, timeScale: { visible: interval !== '1d', timeVisible: interval !== '1d' } });
            const obvLine = charts.obv.addLineSeries({ color: '#2196f3', lineWidth: 2, priceFormat: { type: 'volume' } });
            obvLine.setData(obvData);

            const allCharts = [charts.main, charts.macd, charts.kd, charts.obv];

            if (interval === '1d') {
                charts.chip = LightweightCharts.createChart(document.getElementById('chipChart'), { ...chartOptions, height: 120, timeScale: { visible: true } });
                const chipSeries = charts.chip.addHistogramSeries({ priceFormat: { type: 'volume' } });
                if (chipData && chipData.length > 0) chipSeries.setData(chipData.map(d => ({ time: d.time, value: d.value, color: d.value > 0 ? '#ef5350' : '#26a69a' })));
                allCharts.push(charts.chip);
            }

            // 同步所有圖表
            const syncTimeScale = (s, t) => { s.timeScale().subscribeVisibleTimeRangeChange(r => { t.forEach(x => x.timeScale().setVisibleRange(r)); }); };
            allCharts.forEach(source => {
                const targets = allCharts.filter(c => c !== source);
                syncTimeScale(source, targets);
            });
            
            charts.main.timeScale().fitContent();
        }

        function buyStock() { if(!currentAnalysis.symbol) return; portfolio.push({ symbol: currentAnalysis.symbol, buyPrice: currentAnalysis.price, currentPrice: currentAnalysis.price }); saveAndRender(); }
        function sellStock(index) { portfolio.splice(index, 1); saveAndRender(); }
        function saveAndRender() { localStorage.setItem('myPortfolio', JSON.stringify(portfolio)); renderPortfolio(); }
        
        function renderPortfolio() {
            const tbody = document.getElementById('portfolioBody'); tbody.innerHTML = '';
            if(portfolio.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">目前無持股</td></tr>'; return; }
            portfolio.forEach((item, index) => {
                const pl = ((item.currentPrice - item.buyPrice) / item.buyPrice) * 100;
                const plText = pl >= 0 ? `+${pl.toFixed(2)}%` : `${pl.toFixed(2)}%`;
                tbody.innerHTML += `<tr><td style="color:white; font-weight:bold;">${item.symbol.replace('.TW','')}</td><td>${item.buyPrice.toFixed(2)}</td><td>${parseFloat(item.currentPrice).toFixed(2)}</td><td class="${pl>=0?'profit':'loss'}" style="font-weight:bold;">${plText}</td><td><button style="background:var(--red); color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="sellStock(${index})">平</button></td></tr>`;
            });
        }
        async function updatePortfolioPrices() {
            for (let i = 0; i < portfolio.length; i++) {
                try { const res = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${portfolio[i].symbol}`); if(res.ok) { const data = await res.json(); if(data.status === "success") portfolio[i].currentPrice = data.current_price; } } catch(e) {}
            }
            saveAndRender();
        }
    </script>
</body>
</html>
