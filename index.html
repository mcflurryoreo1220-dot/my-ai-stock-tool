<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票輔助神器 - 終極戰情室</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #151924; --primary-color: #2962ff; --success-color: #ef5350; /*台股紅漲*/ --danger-color: #26a69a; /*台股綠跌*/ --text-main: #d1d4dc; --text-muted: #787b86; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 3fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #2b2b43; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #0b0e14; padding: 15px; border-radius: 8px; border: 1px solid #2b2b43; }
        input { flex: 1; padding: 12px 20px; background: #151924; border: 1px solid #2b2b43; color: white; border-radius: 6px; font-size: 16px; outline: none; }
        button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; background: var(--primary-color); transition: 0.2s; }
        button:hover { background: #1e4bd8; }
        button:disabled { background: #2b2b43; color: var(--text-muted); cursor: not-allowed; }
        
        .chart-wrapper { width: 100%; display: none; flex-direction: column; gap: 3px; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #2b2b43; background: #0b0e14; padding: 5px; }
        #mainChart { width: 100%; height: 350px; }
        #macdChart { width: 100%; height: 120px; }
        #kdChart { width: 100%; height: 120px; }
        #chipChart { width: 100%; height: 120px; } 
        
        .chart-title { position: absolute; z-index: 2; padding: 4px 8px; font-size: 11px; font-weight: bold; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.5); border-radius: 4px; pointer-events: none; margin: 5px; }

        /* 回測面板設計 */
        .quant-panel { display: none; justify-content: space-around; align-items: center; background: #0f131a; padding: 15px; border-radius: 8px; border: 1px dashed #2962ff; margin-bottom: 20px; }
        .quant-item { text-align: center; }
        .quant-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 1px; }
        .quant-item .val { font-size: 24px; font-weight: bold; font-family: monospace; }
        .quant-title { writing-mode: vertical-rl; text-orientation: upright; font-size: 14px; font-weight: bold; color: #2962ff; letter-spacing: 2px; }

        .ai-dashboard { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .info-box { background: #0b0e14; padding: 15px; border-radius: 8px; border: 1px solid #2b2b43; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .info-box.wide { grid-column: span 4; text-align: left; }
        .box-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .box-value { font-size: 20px; font-weight: bold; color: #fff; }

        #tradeZone { display: none; justify-content: space-between; align-items: center; background: #0b0e14; padding: 15px 20px; border-radius: 8px; border: 1px solid #2b2b43; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #2b2b43; }
        .profit { color: var(--success-color); } .loss { color: var(--danger-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="search-bar">
                <input type="text" id="symbol" placeholder="輸入台股代碼 (例: 2330)" value="6285">
                <button id="analyzeBtn" onclick="analyze()">啟動 AI 與量化分析</button>
            </div>
            <div id="sysMessage"></div>

            <div id="tradeZone">
                <div style="display:flex; align-items:center; gap:15px;">
                    <span style="font-size:20px; font-weight:bold; color:#fff;" id="stockTitle"></span>
                    <span style="font-size: 26px; font-weight: bold; color: var(--success-color);" id="currentPriceDisplay"></span>
                </div>
                <button style="background:#ff9800;" onclick="buyStock()">加入模擬倉</button>
            </div>

            <div id="quantPanel" class="quant-panel">
                <div class="quant-title">量化回測</div>
                <div class="quant-item">
                    <div class="label">近半年 KD 交易次數</div>
                    <div class="val" id="bt-trades" style="color: #fff;">0 次</div>
                </div>
                <div class="quant-item">
                    <div class="label">策略歷史勝率</div>
                    <div class="val" id="bt-winrate" style="color: #fff;">0%</div>
                </div>
                <div class="quant-item">
                    <div class="label">累計報酬率</div>
                    <div class="val" id="bt-return" style="color: #fff;">0%</div>
                </div>
            </div>

            <div class="chart-wrapper" id="chartWrapper">
                <div style="position:relative;">
                    <div class="chart-title">日K線 (自動標記 KD 買賣點)</div>
                    <div id="mainChart"></div>
                </div>
                <div style="position:relative;">
                    <div class="chart-title">MACD (12,26,9)</div>
                    <div id="macdChart"></div>
                </div>
                <div style="position:relative;">
                    <div class="chart-title">KD (9,3,3)</div>
                    <div id="kdChart"></div>
                </div>
                <div style="position:relative;">
                    <div class="chart-title">三大法人買賣超 (張)</div>
                    <div id="chipChart"></div>
                </div>
            </div>

            <div id="aiDashboard" class="ai-dashboard">
                <div class="info-box"><div class="box-title">目前趨勢</div><div class="box-value" style="color:#29b6f6;" id="ai-trend">--</div></div>
                <div class="info-box"><div class="box-title">短線壓力</div><div class="box-value" style="color:var(--danger-color);" id="ai-pressure">--</div></div>
                <div class="info-box"><div class="box-title">短線支撐</div><div class="box-value" style="color:var(--success-color);" id="ai-support">--</div></div>
                <div class="info-box"><div class="box-title">操作建議</div><div class="box-value" style="color:#ffb74d;" id="ai-action">--</div></div>
                <div class="info-box wide"><div class="box-title">AI 極簡戰報 (技術+籌碼)</div><div style="font-size: 15px; color: #a5d6a7; line-height: 1.6;" id="ai-summary">--</div></div>
            </div>
        </div>

        <div class="card">
            <h2>我的模擬倉</h2>
            <table id="portfolioTable">
                <thead><tr><th>標的</th><th>買入</th><th>現價</th><th>損益</th><th>操作</th></tr></thead>
                <tbody id="portfolioBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentAnalysis = { symbol: '', price: 0 };
        let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];
        let charts = {}; 

        renderPortfolio();

        async function analyze() {
            let rawSymbol = document.getElementById('symbol').value.trim().toUpperCase();
            if (!rawSymbol) return;
            const symbol = /^\d+$/.test(rawSymbol) ? rawSymbol + ".TW" : rawSymbol;
            document.getElementById('symbol').value = symbol;

            const btn = document.getElementById('analyzeBtn');
            const sysMsg = document.getElementById('sysMessage');
            
            document.getElementById('tradeZone').style.display = "none";
            document.getElementById('chartWrapper').style.display = "none"; 
            document.getElementById('aiDashboard').style.display = "none";
            document.getElementById('quantPanel').style.display = "none";
            
            btn.disabled = true; btn.innerText = "資料運算中...";
            sysMsg.innerHTML = '<span style="color:var(--primary-color);">🔄 正在載入價量、籌碼與執行歷史回測...</span>';
            
            try {
                const response = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}`);
                
                if (!response.ok) {
                    let errDetail = "未知連線錯誤";
                    try { const errJson = await response.json(); errDetail = errJson.message || errDetail; } 
                    catch(e) { errDetail = await response.text(); }
                    throw new Error(`(${response.status}) ${errDetail}`);
                }

                const data = await response.json();
                
                if (data.status === "success") {
                    sysMsg.innerHTML = '';
                    currentAnalysis.symbol = data.symbol; 
                    currentAnalysis.price = data.current_price;
                    
                    document.getElementById('stockTitle').innerText = data.symbol.replace('.TW', '');
                    document.getElementById('currentPriceDisplay').innerText = parseFloat(data.current_price).toFixed(2);
                    
                    document.getElementById('tradeZone').style.display = "flex";
                    
                    const ai = data.ai_analysis;
                    document.getElementById('ai-trend').innerText = ai.trend || '--';
                    document.getElementById('ai-pressure').innerText = ai.pressure || '--';
                    document.getElementById('ai-support').innerText = ai.support || '--';
                    document.getElementById('ai-action').innerText = ai.action || '--';
                    document.getElementById('ai-summary').innerText = ai.summary || '--';
                    document.getElementById('aiDashboard').style.display = "grid";
                    
                    if (data.chart_data) {
                        // 執行 KD 量化回測
                        runBacktest(data.chart_data, data.kd_data);
                        // 繪製圖表
                        renderCharts(data.chart_data, data.macd_data, data.kd_data, data.chip_data);
                    }
                    
                    updatePortfolioPrices(); 
                } else {
                    sysMsg.innerHTML = `<span style="color:var(--danger-color);">❌ 分析出錯：${data.message}</span>`;
                }
            } catch (error) {
                sysMsg.innerHTML = `<span style="color:var(--danger-color);">❌ 連線失敗：伺服器異常 ${error.message}</span>`;
            } finally {
                btn.disabled = false; btn.innerText = "啟動 AI 與量化分析";
            }
        }

        // 【量化回測引擎】：計算 KD 交叉的勝率與報酬
        function runBacktest(klineData, kdData) {
            let holding = false;
            let buyPrice = 0;
            let totalReturn = 0;
            let wins = 0;
            let losses = 0;

            // 建立價格查詢字典
            let priceMap = {};
            klineData.forEach(d => { priceMap[d.time] = d.close; });

            for (let i = 1; i < kdData.length; i++) {
                const prev = kdData[i - 1];
                const curr = kdData[i];
                const currentPrice = priceMap[curr.time];
                if(!currentPrice) continue;

                // 黃金交叉：買進
                if (!holding && prev.k <= prev.d && curr.k > curr.d) {
                    holding = true;
                    buyPrice = currentPrice;
                }
                // 死亡交叉：賣出
                else if (holding && prev.k >= prev.d && curr.k < curr.d) {
                    holding = false;
                    let sellPrice = currentPrice;
                    let profitPercent = ((sellPrice - buyPrice) / buyPrice) * 100;
                    totalReturn += profitPercent;
                    if (profitPercent > 0) wins++;
                    else losses++;
                }
            }

            // 如果目前手上還持有，用最後一天收盤價結算未實現損益
            if (holding) {
                let lastPrice = klineData[klineData.length-1].close;
                let profitPercent = ((lastPrice - buyPrice) / buyPrice) * 100;
                totalReturn += profitPercent;
                if (profitPercent > 0) wins++;
                else losses++;
            }

            let totalTrades = wins + losses;
            let winRate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
            
            // 更新 UI 面板
            document.getElementById('bt-trades').innerText = `${totalTrades} 次`;
            
            const winRateEl = document.getElementById('bt-winrate');
            winRateEl.innerText = `${winRate}%`;
            winRateEl.style.color = winRate > 50 ? 'var(--success-color)' : (winRate == 0 ? '#fff' : 'var(--danger-color)');

            const returnEl = document.getElementById('bt-return');
            returnEl.innerText = `${totalReturn > 0 ? '+' : ''}${totalReturn.toFixed(2)}%`;
            returnEl.style.color = totalReturn >= 0 ? 'var(--success-color)' : 'var(--danger-color)';

            document.getElementById('quantPanel').style.display = "flex";
        }

        function renderCharts(klineData, macdData, kdData, chipData) {
            document.getElementById('chartWrapper').style.display = 'flex';

            if (charts.main) { 
                charts.main.remove(); charts.macd.remove(); charts.kd.remove(); 
                if(charts.chip) charts.chip.remove();
            }

            const chartOptions = { layout: { background: { color: '#0b0e14' }, textColor: '#787b86' }, grid: { vertLines: { color: '#151924' }, horzLines: { color: '#151924' } }, crosshair: { mode: LightweightCharts.CrosshairMode.Normal }, timeScale: { visible: false } };

            charts.main = LightweightCharts.createChart(document.getElementById('mainChart'), { ...chartOptions, height: 350 });
            const candleSeries = charts.main.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a' });
            candleSeries.setData(klineData);

            // 自動畫上買賣標記
            if (kdData && kdData.length > 1) {
                let markers = [];
                for (let i = 1; i < kdData.length; i++) {
                    const prev = kdData[i - 1];
                    const curr = kdData[i];
                    if (prev.k <= prev.d && curr.k > curr.d) {
                        markers.push({ time: curr.time, position: 'belowBar', color: '#ef5350', shape: 'arrowUp', text: '買進' });
                    }
                    else if (prev.k >= prev.d && curr.k < curr.d) {
                        markers.push({ time: curr.time, position: 'aboveBar', color: '#26a69a', shape: 'arrowDown', text: '賣出' });
                    }
                }
                candleSeries.setMarkers(markers);
            }

            charts.macd = LightweightCharts.createChart(document.getElementById('macdChart'), { ...chartOptions, height: 120 });
            const macdOscSeries = charts.macd.addHistogramSeries({ color: '#26a69a', priceFormat: { type: 'volume' } });
            const macdDifSeries = charts.macd.addLineSeries({ color: '#29b6f6', lineWidth: 1.5 });
            const macdSigSeries = charts.macd.addLineSeries({ color: '#ffa726', lineWidth: 1.5 });
            
            macdOscSeries.setData(macdData.map(d => ({ time: d.time, value: d.osc, color: d.osc > 0 ? '#ef5350' : '#26a69a' })));
            macdDifSeries.setData(macdData.map(d => ({ time: d.time, value: d.dif })));
            macdSigSeries.setData(macdData.map(d => ({ time: d.time, value: d.signal })));

            charts.kd = LightweightCharts.createChart(document.getElementById('kdChart'), { ...chartOptions, height: 120 });
            const kLine = charts.kd.addLineSeries({ color: '#29b6f6', lineWidth: 1.5 }); 
            const dLine = charts.kd.addLineSeries({ color: '#ffa726', lineWidth: 1.5 }); 
            kLine.setData(kdData.map(d => ({ time: d.time, value: d.k })));
            dLine.setData(kdData.map(d => ({ time: d.time, value: d.d })));

            charts.chip = LightweightCharts.createChart(document.getElementById('chipChart'), { ...chartOptions, height: 120, timeScale: { visible: true } });
            const chipSeries = charts.chip.addHistogramSeries({ priceFormat: { type: 'volume' } });
            if (chipData && chipData.length > 0) {
                chipSeries.setData(chipData.map(d => ({ time: d.time, value: d.value, color: d.value > 0 ? '#ef5350' : '#26a69a' })));
            }

            const syncTimeScale = (source, targets) => { source.timeScale().subscribeVisibleTimeRangeChange(range => { targets.forEach(t => t.timeScale().setVisibleRange(range)); }); };
            syncTimeScale(charts.main, [charts.macd, charts.kd, charts.chip]);
            syncTimeScale(charts.macd, [charts.main, charts.kd, charts.chip]);
            syncTimeScale(charts.kd,   [charts.main, charts.macd, charts.chip]);
            syncTimeScale(charts.chip, [charts.main, charts.macd, charts.kd]);
            
            charts.main.timeScale().fitContent();
        }

        // 模擬倉操作
        function buyStock() {
            if(!currentAnalysis.symbol || currentAnalysis.price === 0) return;
            portfolio.push({ symbol: currentAnalysis.symbol, buyPrice: currentAnalysis.price, currentPrice: currentAnalysis.price });
            saveAndRender();
        }
        function sellStock(index) { portfolio.splice(index, 1); saveAndRender(); }
        function saveAndRender() { localStorage.setItem('myPortfolio', JSON.stringify(portfolio)); renderPortfolio(); }
        
        function renderPortfolio() {
            const tbody = document.getElementById('portfolioBody');
            tbody.innerHTML = '';
            if(portfolio.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">目前無持股</td></tr>'; return; }
            portfolio.forEach((item, index) => {
                const pl = ((item.currentPrice - item.buyPrice) / item.buyPrice) * 100;
                const plClass = pl >= 0 ? 'profit' : 'loss';
                const plText = pl >= 0 ? `+${pl.toFixed(2)}%` : `${pl.toFixed(2)}%`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:#fff; font-weight:bold;">${item.symbol.replace('.TW', '')}</td>
                    <td>${item.buyPrice.toFixed(2)}</td><td>${parseFloat(item.currentPrice).toFixed(2)}</td>
                    <td class="${plClass}" style="font-weight:bold;">${plText}</td>
                    <td><button style="background:var(--danger-color); color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="sellStock(${index})">平</button></td>
                `;
                tbody.appendChild(tr);
            });
        }
        async function updatePortfolioPrices() {
            for (let i = 0; i < portfolio.length; i++) {
                try {
                    const res = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${portfolio[i].symbol}`);
                    if(res.ok) {
                        const data = await res.json();
                        if(data.status === "success") portfolio[i].currentPrice = data.current_price;
                    }
                } catch(e) {}
            }
            saveAndRender();
        }
    </script>
</body>
</html>
