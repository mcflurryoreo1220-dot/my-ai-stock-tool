<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票戰情室 - A 計畫旗艦版</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-dark: #050810; --panel-bg: #111520; --border-color: #232b3e; --text-main: #d1d4dc; --text-muted: #787b86; --blue: #2962ff; --red: #ef5350; --green: #26a69a; --orange: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .search-group { display: flex; gap: 10px; width: 60%; }
        input, select { padding: 10px; background: #0b0e14; border: 1px solid var(--border-color); color: white; border-radius: 4px; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; background: var(--blue); }
        .price-zone { display: none; align-items: baseline; gap: 15px; }
        .current-price { font-size: 32px; font-weight: bold; color: var(--red); }
        .main-grid { display: grid; grid-template-columns: 7fr 3fr; gap: 15px; display: none; }
        .left-col, .right-col { display: flex; flex-direction: column; gap: 15px; }
        .chart-wrapper { background: var(--panel-bg); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); }
        .chart-box { position: relative; width: 100%; }
        .chart-title { position: absolute; z-index: 2; padding: 3px 6px; font-size: 11px; background: rgba(0,0,0,0.6); color: #fff; top: 5px; left: 5px; }
        .chart-legend { position: absolute; z-index: 10; font-size: 12px; color: #fff; background: rgba(0,0,0,0.7); border-radius: 4px; top: 30px; left: 5px; padding: 5px; display: none; }
        #mainChart { height: 350px; } .sub-chart { height: 120px; }
        .info-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .card-header { font-size: 13px; font-weight: bold; color: var(--blue); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
        .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .f-item { background: #0b0e14; padding: 10px; border-radius: 4px; text-align: center; }
        .f-label { font-size: 11px; color: var(--text-muted); }
        .f-val { font-size: 16px; font-weight: bold; color: white; margin-top: 5px; }
        .stars { color: var(--orange); font-size: 20px; }
        .quant-panel { display: flex; justify-content: space-around; background: var(--panel-bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--blue); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="search-group">
            <input type="text" id="symbol" value="3661">
            <select id="intervalSelector">
                <option value="1d">日K</option><option value="60m">60分K</option><option value="15m">15分K</option><option value="5m">5分K</option>
            </select>
            <button onclick="analyze()">啟動全盤掃描</button>
        </div>
        <div class="price-zone" id="priceZone">
            <div id="stockTitle" style="font-weight:bold;">--</div>
            <div class="current-price" id="currentPriceDisplay">0.00</div>
        </div>
    </div>
    <div id="sysMessage"></div>
    <div class="main-grid" id="mainGrid">
        <div class="left-col">
            <div class="quant-panel">
                <div class="quant-item"><div class="label">勝率</div><div class="val" id="bt-winrate">0%</div></div>
                <div class="quant-item"><div class="label">累計報酬</div><div class="val" id="bt-return">0%</div></div>
            </div>
            <div class="chart-wrapper">
                <div class="chart-box"><div class="chart-title">K線</div><div class="chart-legend" id="chartLegend"></div><div id="mainChart"></div></div>
                <div class="chart-box"><div id="macdChart" class="sub-chart"></div></div>
                <div class="chart-box"><div id="kdChart" class="sub-chart"></div></div>
                <div class="chart-box"><div id="obvChart" class="sub-chart"></div></div>
                <div class="chart-box" id="chipBox"><div id="chipChart" class="sub-chart"></div></div>
            </div>
        </div>
        <div class="right-col">
            <div class="info-card" style="text-align:center;">
                <div class="card-header">AI 綜合評估</div>
                <div id="ai-signal" style="font-size:20px; font-weight:bold;">--</div>
                <div class="stars" id="ai-stars">☆☆☆☆☆</div>
            </div>
            <div class="info-card">
                <div class="card-header">公司結構體檢 (基本面)</div>
                <div class="f-grid">
                    <div class="f-item"><div class="f-label">EPS (每股盈餘)</div><div class="f-val" id="f-eps">--</div></div>
                    <div class="f-item"><div class="f-label">P/E (本益比)</div><div class="f-val" id="f-pe">--</div></div>
                    <div class="f-item"><div class="f-label">殖利率</div><div class="f-val" id="f-yield">--</div></div>
                    <div class="f-item"><div class="f-label">總市值</div><div class="f-val" id="f-cap">--</div></div>
                </div>
            </div>
            <div class="info-card">
                <div class="card-header">關鍵價位</div>
                <div class="f-grid">
                    <div class="f-item"><div class="f-label">壓力</div><div class="f-val" id="ai-pressure" style="color:var(--green)">--</div></div>
                    <div class="f-item"><div class="f-label">支撐</div><div class="f-val" id="ai-support" style="color:var(--red)">--</div></div>
                </div>
            </div>
            <div class="info-card">
                <div class="card-header">AI 操作建議</div>
                <ul id="ai-advice" style="font-size:13px; color:#a5d6a7;"></ul>
            </div>
        </div>
    </div>
    <script>
        let charts = {};
        async function analyze() {
            const symbol = document.getElementById('symbol').value + ".TW";
            const interval = document.getElementById('intervalSelector').value;
            const sysMsg = document.getElementById('sysMessage');
            sysMsg.innerHTML = "正在調度 PRO 大腦分析基本面與技術面...";
            try {
                const res = await fetch(`https://my-ai-stock-tool.onrender.com/predict?symbol=${symbol}&interval=${interval}`);
                const data = await res.json();
                if(data.status === "success") {
                    sysMsg.innerHTML = "";
                    document.getElementById('mainGrid').style.display = "grid";
                    document.getElementById('priceZone').style.display = "flex";
                    document.getElementById('stockTitle').innerText = data.symbol;
                    document.getElementById('currentPriceDisplay').innerText = data.current_price;
                    
                    // 填充基本面
                    document.getElementById('f-eps').innerText = data.fundamental.eps;
                    document.getElementById('f-pe').innerText = data.fundamental.pe_ratio;
                    document.getElementById('f-yield').innerText = data.fundamental.dividend_yield;
                    document.getElementById('f-cap').innerText = data.fundamental.market_cap;
                    
                    const ai = data.ai_analysis;
                    document.getElementById('ai-signal').innerText = ai.signal;
                    document.getElementById('ai-pressure').innerText = ai.pressure;
                    document.getElementById('ai-support').innerText = ai.support;
                    document.getElementById('ai-stars').innerText = '★'.repeat(ai.stars) + '☆'.repeat(5-ai.stars);
                    const adviceUl = document.getElementById('ai-advice');
                    adviceUl.innerHTML = ai.advice.map(t => `<li>${t}</li>`).join('');

                    renderCharts(data);
                }
            } catch(e) { sysMsg.innerHTML = "施工中，請稍後..."; }
        }
        function renderCharts(data) {
            if(charts.main) Object.values(charts).forEach(c => c.remove());
            const options = { layout: { background: { color: '#111520' }, textColor: '#787b86' }, grid: { vertLines: { color: '#232b3e' }, horzLines: { color: '#232b3e' } }, timeScale: { visible: true } };
            charts.main = LightweightCharts.createChart(document.getElementById('mainChart'), options);
            const candleSeries = charts.main.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a' });
            candleSeries.setData(data.chart_data);
            charts.main.timeScale().fitContent();
        }
    </script>
</body>
</html>
